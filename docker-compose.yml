services:
  bot:
    build: .
    env_file: .env
    environment:
      - DB_PATH=/data/bot.db
      - FAISS_INDEX_DIR=/app/data/faiss_db
    volumes:
      - botdata:/data
      - faiss-data:/app/data/faiss_db
    restart: unless-stopped
    depends_on:
      - api

  api:
    build: .
    entrypoint: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]
    env_file: .env
    ports:
      - "8000:8000"
    environment:
      - FAISS_INDEX_DIR=/app/data/faiss_db
    volumes:
      - botdata:/data
      - faiss-data:/app/data/faiss_db
    restart: unless-stopped

volumes:
  botdata:
  faiss-data:
